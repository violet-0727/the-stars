<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星途剧情编辑器 - TheStars Story Editor</title>
  <style>
    /* ===== 全局重置与字体 ===== */
    @font-face {
      font-family: 'MiSans';
      src: url('assets/fonts/MiSans-Semibold.ttf') format('truetype');
      font-weight: 600;
    }
    @font-face {
      font-family: 'MiSans';
      src: url('assets/fonts/MiSans-Bold.ttf') format('truetype');
      font-weight: 700;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    :root {
      --primary: #4B73D3;
      --primary-dark: #3A5CB8;
      --primary-light: #6B8FE8;
      --accent-teal: #3ECDC6;
      --accent-orange: #F5A623;
      --accent-pink: #E84C88;
      --bg-dark: #1A1E2E;
      --bg-panel: rgba(20, 25, 45, 0.85);
      --bg-chat: rgba(15, 20, 38, 0.75);
      --text-primary: #FFFFFF;
      --text-secondary: rgba(255, 255, 255, 0.7);
      --text-muted: rgba(255, 255, 255, 0.4);
      --border-color: rgba(75, 115, 211, 0.3);
      --bubble-self: #4B73D3;
      --bubble-other: rgba(255, 255, 255, 0.1);
      --toolbar-width: 64px;
      --contacts-width: 340px;
    }

    body {
      font-family: 'MiSans', 'Microsoft YaHei', 'PingFang SC', sans-serif;
      color: var(--text-primary);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* ===== 背景层 ===== */
    .app-background {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: url('assets/background/LandMark_001.png') center/cover no-repeat;
      z-index: 0;
    }
    .app-background::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(135deg, rgba(10, 15, 35, 0.55) 0%, rgba(30, 40, 80, 0.45) 100%);
    }

    /* ===== 自定义标题栏 ===== */
    .titlebar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 36px;
      background: rgba(10, 15, 35, 0.9);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 1000;
      -webkit-app-region: drag;
      border-bottom: 1px solid rgba(75, 115, 211, 0.2);
    }
    .titlebar-title {
      margin-left: 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 1px;
    }
    .titlebar-title span {
      color: var(--accent-teal);
    }
    .titlebar-controls {
      display: flex;
      -webkit-app-region: no-drag;
    }
    .titlebar-btn {
      width: 46px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      border: none; background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 12px;
      transition: background 0.15s;
    }
    .titlebar-btn:hover { background: rgba(255,255,255,0.1); }
    .titlebar-btn.close:hover { background: #E04848; color: white; }

    /* ===== 主容器 ===== */
    .app-container {
      position: relative;
      z-index: 1;
      display: flex;
      height: 100vh;
      padding-top: 36px;
    }

    /* ===== 左侧工具栏 ===== */
    .toolbar {
      width: var(--toolbar-width);
      min-width: var(--toolbar-width);
      background: linear-gradient(180deg, var(--primary) 0%, var(--primary-dark) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 0;
      gap: 4px;
      box-shadow: 2px 0 12px rgba(0,0,0,0.3);
      z-index: 10;
    }

    .toolbar-logo {
      width: 40px; height: 40px;
      margin-bottom: 12px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.15);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .toolbar-logo:hover { background: rgba(255,255,255,0.25); transform: scale(1.05); }
    .toolbar-logo svg { width: 24px; height: 24px; fill: white; }

    .toolbar-divider {
      width: 32px; height: 1px;
      background: rgba(255,255,255,0.2);
      margin: 4px 0;
    }

    .toolbar-btn {
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      border: none; background: transparent;
      color: rgba(255,255,255,0.65);
      cursor: pointer;
      border-radius: 12px;
      transition: all 0.2s;
      position: relative;
    }
    .toolbar-btn:hover {
      background: rgba(255,255,255,0.15);
      color: white;
    }
    .toolbar-btn.active {
      background: rgba(255,255,255,0.2);
      color: white;
      box-shadow: 0 0 12px rgba(255,255,255,0.15);
    }
    .toolbar-btn svg { width: 22px; height: 22px; }
    .toolbar-btn .badge {
      position: absolute;
      top: 4px; right: 4px;
      width: 8px; height: 8px;
      background: var(--accent-pink);
      border-radius: 50%;
    }
    .toolbar-btn .tooltip {
      position: absolute;
      left: 56px; top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.85);
      color: white;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 100;
    }
    .toolbar-btn:hover .tooltip { opacity: 1; }

    .toolbar-spacer { flex: 1; }

    /* ===== 联系人面板 ===== */
    .contacts-panel {
      width: var(--contacts-width);
      min-width: var(--contacts-width);
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .contacts-bg {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: url('assets/phone/1775047645653.png') center/cover no-repeat;
      z-index: 0;
    }
    .contacts-bg::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(180deg, rgba(15, 20, 45, 0.88) 0%, rgba(10, 15, 35, 0.92) 100%);
    }
    .contacts-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .contacts-header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border-color);
    }
    .contacts-header h2 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .contacts-header h2 .icon {
      width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
    }

    .contacts-search {
      position: relative;
    }
    .contacts-search input {
      width: 100%;
      height: 36px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      padding: 0 16px 0 36px;
      color: white;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: all 0.2s;
    }
    .contacts-search input::placeholder { color: var(--text-muted); }
    .contacts-search input:focus {
      border-color: var(--primary-light);
      background: rgba(255,255,255,0.12);
    }
    .contacts-search svg {
      position: absolute;
      left: 12px; top: 50%;
      transform: translateY(-50%);
      width: 16px; height: 16px;
      fill: var(--text-muted);
    }

    .contacts-tabs {
      display: flex;
      padding: 8px 20px 0;
      gap: 4px;
    }
    .contacts-tab {
      flex: 1;
      padding: 8px 0;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 12px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .contacts-tab:hover { color: var(--text-secondary); }
    .contacts-tab.active {
      color: var(--accent-teal);
      border-bottom-color: var(--accent-teal);
    }

    .contacts-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
    }
    .contacts-list::-webkit-scrollbar { width: 4px; }
    .contacts-list::-webkit-scrollbar-track { background: transparent; }
    .contacts-list::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.15s;
      gap: 12px;
      position: relative;
    }
    .contact-item:hover { background: rgba(255,255,255,0.06); }
    .contact-item.active {
      background: rgba(75, 115, 211, 0.2);
      border: 1px solid rgba(75, 115, 211, 0.3);
    }
    .contact-item.active::before {
      content: '';
      position: absolute;
      left: 0; top: 50%;
      transform: translateY(-50%);
      width: 3px; height: 24px;
      background: var(--accent-teal);
      border-radius: 0 2px 2px 0;
    }

    .contact-avatar {
      width: 48px; height: 48px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.15);
      flex-shrink: 0;
      position: relative;
    }
    .contact-avatar img {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .contact-avatar .status-dot {
      position: absolute;
      bottom: 1px; right: 1px;
      width: 12px; height: 12px;
      border-radius: 50%;
      border: 2px solid rgba(15, 20, 45, 0.9);
    }
    .status-dot.online { background: #4ADE80; }
    .status-dot.away { background: var(--accent-orange); }
    .status-dot.offline { background: #6B7280; }

    .contact-info {
      flex: 1;
      min-width: 0;
    }
    .contact-name {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 2px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .contact-name .pin-icon {
      width: 14px; height: 14px;
      opacity: 0.5;
    }
    .contact-preview {
      font-size: 12px;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .contact-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      flex-shrink: 0;
    }
    .contact-time {
      font-size: 11px;
      color: var(--text-muted);
    }
    .contact-badge {
      min-width: 18px; height: 18px;
      background: var(--accent-pink);
      border-radius: 9px;
      font-size: 10px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      padding: 0 5px;
    }


    .contacts-add-btn {
      margin: 8px 16px 16px;
      padding: 10px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s;
    }
    .contacts-add-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(75,115,211,0.4); }
    .contacts-add-btn svg { width: 18px; height: 18px; }

    /* ===== 聊天面板 ===== */
    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-chat);
      backdrop-filter: blur(20px);
      border-left: 1px solid var(--border-color);
      position: relative;
    }

    .chat-header {
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-color);
      background: rgba(15, 20, 40, 0.5);
      backdrop-filter: blur(12px);
    }
    .chat-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .chat-header-avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid var(--primary-light);
    }
    .chat-header-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .chat-header-info h3 {
      font-size: 15px;
      font-weight: 700;
    }
    .chat-header-info p {
      font-size: 11px;
      color: var(--text-muted);
    }
    .chat-header-actions {
      display: flex;
      gap: 8px;
    }
    .chat-action-btn {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
    }
    .chat-action-btn:hover {
      background: rgba(255,255,255,0.12);
      color: white;
    }
    .chat-action-btn svg { width: 18px; height: 18px; }

    /* 聊天消息区 */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .chat-messages::-webkit-scrollbar { width: 6px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.12);
      border-radius: 3px;
    }

    .chat-date-divider {
      text-align: center;
      padding: 12px 0;
      position: relative;
    }
    .chat-date-divider span {
      background: rgba(15, 20, 38, 0.8);
      padding: 4px 16px;
      border-radius: 12px;
      font-size: 11px;
      color: var(--text-muted);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .message-row {
      display: flex;
      gap: 10px;
      max-width: 75%;
      animation: msgSlideIn 0.25s ease-out;
    }
    @keyframes msgSlideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message-row.self {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
    .message-row .msg-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .message-row .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .message-row.self .msg-avatar { display: none; }

    .msg-content {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .msg-sender {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 2px;
      margin-left: 4px;
    }
    .message-row.self .msg-sender { display: none; }

    .msg-bubble {
      padding: 10px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
      position: relative;
    }
    .message-row:not(.self) .msg-bubble {
      background: var(--bubble-other);
      border: 1px solid rgba(255,255,255,0.06);
      border-top-left-radius: 4px;
    }
    .message-row.self .msg-bubble {
      background: linear-gradient(135deg, var(--bubble-self) 0%, var(--primary-light) 100%);
      border-top-right-radius: 4px;
    }

    .msg-time {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 2px;
      padding: 0 4px;
    }
    .message-row.self .msg-time { text-align: right; }

    /* 系统消息 / 旁白 */
    .system-message {
      text-align: center;
      padding: 8px 0;
    }
    .system-message .sys-content {
      display: inline-block;
      padding: 6px 20px;
      background: rgba(62, 205, 198, 0.1);
      border: 1px solid rgba(62, 205, 198, 0.2);
      border-radius: 16px;
      font-size: 12px;
      color: var(--accent-teal);
      font-style: italic;
    }

    /* 选项消息 */
    .choice-message {
      align-self: center;
      max-width: 85%;
      width: 100%;
    }
    .choice-container {
      background: rgba(75, 115, 211, 0.08);
      border: 1px solid rgba(75, 115, 211, 0.2);
      border-radius: 16px;
      padding: 16px;
    }
    .choice-title {
      font-size: 13px;
      color: var(--accent-teal);
      margin-bottom: 10px;
      text-align: center;
      font-weight: 600;
    }
    .choice-options {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .choice-option {
      padding: 10px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
    }
    .choice-option:hover {
      background: rgba(75, 115, 211, 0.2);
      border-color: var(--primary-light);
    }

    /* ===== 聊天输入区 ===== */
    .chat-input-area {
      padding: 12px 24px 16px;
      border-top: 1px solid var(--border-color);
      background: rgba(15, 20, 40, 0.5);
      backdrop-filter: blur(12px);
    }
    .chat-input-toolbar {
      display: flex;
      gap: 4px;
      margin-bottom: 8px;
    }
    .input-tool-btn {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.2s;
    }
    .input-tool-btn:hover {
      background: rgba(255,255,255,0.08);
      color: var(--text-secondary);
    }
    .input-tool-btn svg { width: 18px; height: 18px; }

    .chat-input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .chat-input-wrap {
      flex: 1;
      position: relative;
    }
    .chat-input-wrap select {
      position: absolute;
      left: 10px; top: 50%;
      transform: translateY(-50%);
      background: rgba(75, 115, 211, 0.3);
      border: 1px solid rgba(75, 115, 211, 0.4);
      color: white;
      font-size: 11px;
      font-family: inherit;
      padding: 2px 6px;
      border-radius: 6px;
      cursor: pointer;
      outline: none;
      z-index: 2;
    }
    .chat-input-wrap select option {
      background: #1A1E2E;
      color: white;
    }
    .chat-input {
      width: 100%;
      min-height: 40px;
      max-height: 120px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 10px 16px;
      color: white;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      line-height: 1.4;
      transition: border-color 0.2s;
    }
    .chat-input:focus {
      border-color: var(--primary-light);
    }
    .chat-input::placeholder { color: var(--text-muted); }
    .chat-input.has-sender {
      padding-left: 80px;
    }

    .send-btn {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      border: none;
      border-radius: 12px;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 12px rgba(75,115,211,0.4); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
    .send-btn svg { width: 20px; height: 20px; }

    /* ===== 空状态 ===== */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      gap: 16px;
    }
    .empty-state svg { width: 64px; height: 64px; opacity: 0.3; }
    .empty-state p { font-size: 14px; }

    /* ===== 弹窗 / 对话框 ===== */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 2000;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.show { display: flex; }

    .modal {
      background: linear-gradient(180deg, #1E2440 0%, #161B30 100%);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 28px;
      min-width: 420px;
      max-width: 520px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      animation: modalIn 0.2s ease-out;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.95) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal h3 {
      font-size: 18px;
      margin-bottom: 20px;
      display: flex; align-items: center; gap: 8px;
    }
    .modal-field {
      margin-bottom: 16px;
    }
    .modal-field label {
      display: block;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 6px;
      font-weight: 600;
    }
    .modal-field input,
    .modal-field select {
      width: 100%;
      height: 40px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 0 14px;
      color: white;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .modal-field input:focus,
    .modal-field select:focus {
      border-color: var(--primary-light);
    }
    .modal-field select option { background: #1A1E2E; }
    .modal-avatar-pick {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      max-height: 160px;
      overflow-y: auto;
      padding: 4px;
    }
    .modal-avatar-pick::-webkit-scrollbar { width: 4px; }
    .modal-avatar-pick::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
    .avatar-option {
      width: 48px; height: 48px;
      border-radius: 50%;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .avatar-option:hover { border-color: rgba(255,255,255,0.3); }
    .avatar-option.selected { border-color: var(--accent-teal); box-shadow: 0 0 12px rgba(62,205,198,0.3); }
    .avatar-option img { width: 100%; height: 100%; object-fit: cover; }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 24px;
    }
    .modal-btn {
      padding: 10px 24px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }
    .modal-btn.cancel {
      background: rgba(255,255,255,0.06);
      color: var(--text-secondary);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .modal-btn.cancel:hover { background: rgba(255,255,255,0.1); }
    .modal-btn.confirm {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      color: white;
    }
    .modal-btn.confirm:hover { box-shadow: 0 4px 12px rgba(75,115,211,0.4); }

    /* ===== 右键菜单 ===== */
    .context-menu {
      position: fixed;
      background: rgba(25, 30, 55, 0.95);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 6px;
      min-width: 160px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      z-index: 3000;
      display: none;
    }
    .context-menu.show { display: block; }
    .ctx-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.1s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: inherit;
    }
    .ctx-item:hover { background: rgba(255,255,255,0.08); color: white; }
    .ctx-item.danger { color: #E04848; }
    .ctx-item.danger:hover { background: rgba(224, 72, 72, 0.15); }
    .ctx-item svg { width: 16px; height: 16px; flex-shrink: 0; }
    .ctx-divider { height: 1px; background: rgba(255,255,255,0.06); margin: 4px 8px; }

    /* ===== 响应式 ===== */
    @media (max-width: 900px) {
      .contacts-panel { width: 280px; min-width: 280px; }
    }
  </style>
</head>
<body>

<!-- 背景层 -->

<!-- 标题栏 -->

<script>
  // ===== 数据模型 =====
  const AVATARS_PATH = 'assets/avatars/';
  const CHAT_AVATARS_PATH = 'assets/avatars/';
  const STATUS_ICONS = {
    new: 'assets/icons/icon_phone_new.png',
    done: 'assets/icons/icon_phone_done.png',
    pinned: 'assets/icons/icon_phone_pinned.png',
    ing: 'assets/icons/icon_phone_ing.png'
  };


  const AVAILABLE_AVATARS = [
    '苍兰', '尘沙', '赤霞', '冬香', '多娜', '翡冷翠', '风影', '格芮',
    '琥珀', '花原', '焦糖', '璟麟', '卡娜丝', '卡西米拉', '珂赛特',
    '科洛妮丝', '菈露', '岭川', '密涅瓦', '千都世', '师渺', '特丽莎',
    '缇莉娅', '雾语', '希娅', '夏花', '小禾', '杏子', '鸢尾', '紫槿'
  ];

  // 项目数据
  let projectData = {
    contacts: [],
    chats: {}
  };

  let activeContactId = null;
  let selectedAvatar = null;
  let contextTarget = null;
  let currentTab = 'messages';

  // ===== 初始化 =====
  function init() {
    // 添加示例数据
    addContact('苍兰', '苍兰', { type: 'message', pinned: true });
    addContact('希娅', '希娅', { type: 'message' });
    addContact('璟麟', '璟麟', { type: 'message' });
    addContact('星塔作战组', '卡西米拉', { type: 'group' });
    addContact('公告频道', '密涅瓦', { type: 'channel' });

    // 添加示例聊天记录
    const c1 = projectData.contacts[0];
    projectData.chats[c1.id] = [
      { type: 'system', content: '剧情开始 - 第一章：相遇' },
      { type: 'message', sender: c1.id, senderName: c1.name, content: '你好，旅行者。欢迎来到星塔。', time: '10:30', avatar: c1.avatar },
      { type: 'message', sender: 'self', content: '你好，请问这里是...？', time: '10:31' },
      { type: 'message', sender: c1.id, senderName: c1.name, content: '这里是星塔的中心大厅，所有旅人都会经过这里。', time: '10:31', avatar: c1.avatar },
      { type: 'message', sender: c1.id, senderName: c1.name, content: '你看起来不像是本地人呢，从远处来的吗？', time: '10:32', avatar: c1.avatar },
      { type: 'choice', title: '选择回答方式', options: ['坦诚相告', '含糊其辞', '反问对方'] },
    ];

    renderContacts();
    initAvatarPicker();
  }

  // ===== 联系人管理 =====
  let contactIdCounter = 0;
  function addContact(name, avatarName, options = {}) {
    const type = options.type || 'message';
    const pinned = Boolean(options.pinned);
    const id = 'contact_' + (++contactIdCounter);
    projectData.contacts.push({
      id, name,
      avatar: AVATARS_PATH + avatarName + '.png',
      avatarName,
      type,
      pinned,
      status: 'online'
    });
    if (!projectData.chats[id]) {
      projectData.chats[id] = [];
    }
    return id;
  }

  function renderContacts() {
    const list = document.getElementById('contactsList');
    const searchVal = document.getElementById('searchInput').value.toLowerCase();

    // 兼容旧数据：没有 type 的联系人默认视为消息
    projectData.contacts.forEach(c => {
      if (!c.type) c.type = 'message';
    });

    let contacts = [...projectData.contacts];

    // 过滤
    if (searchVal) {
      contacts = contacts.filter(c => c.name.toLowerCase().includes(searchVal));
    }
    if (currentTab === 'messages') {
      contacts = contacts.filter(c => (c.type || 'message') === 'message');
    }
    if (currentTab === 'groups') {
      contacts = contacts.filter(c => (c.type || 'message') === 'group');
    }
    if (currentTab === 'channels') {
      contacts = contacts.filter(c => (c.type || 'message') === 'channel');
    }

    // 排序：置顶优先（在各自类型内生效）
    contacts.sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0));

    list.innerHTML = contacts.map(c => {
      const chat = projectData.chats[c.id] || [];
      const lastMsg = chat.filter(m => m.type === 'message').slice(-1)[0];
      const preview = lastMsg ? lastMsg.content : '暂无消息';
      const time = lastMsg ? lastMsg.time : '';
      const unread = chat.length > 0 ? '' : '';
      const isActive = c.id === activeContactId;

      return `
        <div class="contact-item ${isActive ? 'active' : ''}"
             onclick="selectContact('${c.id}')"
             oncontextmenu="showContactCtx(event, '${c.id}')">
          <div class="contact-avatar">
            <img src="${c.avatar}" alt="${c.name}">
            <div class="status-dot ${c.status}"></div>
          </div>
          <div class="contact-info">
            <div class="contact-name">
              ${c.name}
              ${c.pinned ? '<img class="pin-icon" src="' + STATUS_ICONS.pinned + '" alt="pinned">' : ''}
            </div>
            <div class="contact-preview">${preview}</div>
          </div>
          <div class="contact-meta">
            <span class="contact-time">${time}</span>
          </div>
        </div>
      `;
    }).join('');
  }

  function selectContact(id) {
    activeContactId = id;
    const contact = projectData.contacts.find(c => c.id === id);
    if (!contact) return;

    // 更新头部
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('chatHeader').style.display = 'flex';
    document.getElementById('chatMessages').style.display = 'flex';
    document.getElementById('chatInputArea').style.display = 'block';

    document.getElementById('chatHeaderAvatar').querySelector('img').src = contact.avatar;
    document.getElementById('chatHeaderName').textContent = contact.name;
    document.getElementById('chatHeaderStatus').textContent =
      `${projectData.chats[id].length} 条消息`;

    // 更新发送者选择
    updateSenderSelect();

    renderChat();
    renderContacts();
  }

  function updateSenderSelect() {
    const sel = document.getElementById('senderSelect');
    sel.innerHTML = '<option value="self">自己</option>';
    projectData.contacts.forEach(c => {
      sel.innerHTML += `<option value="${c.id}">${c.name}</option>`;
    });
  }

  function filterContacts(val) {
    renderContacts();
  }

  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.contacts-tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`.contacts-tab[data-tab="${tab}"]`).classList.add('active');
    renderContacts();
  }

  // ===== 聊天渲染 =====
  function renderChat() {
    if (!activeContactId) return;
    const messages = projectData.chats[activeContactId] || [];
    const container = document.getElementById('chatMessages');

    container.innerHTML = messages.map((msg, idx) => {
      if (msg.type === 'system') {
        return `<div class="system-message" data-idx="${idx}" oncontextmenu="showMsgCtx(event, ${idx})">
          <span class="sys-content">${msg.content}</span>
        </div>`;
      }
      if (msg.type === 'choice') {
        return `<div class="choice-message" data-idx="${idx}" oncontextmenu="showMsgCtx(event, ${idx})">
          <div class="choice-container">
            <div class="choice-title">${msg.title || '请选择'}</div>
            <div class="choice-options">
              ${msg.options.map(opt => `<button class="choice-option">${opt}</button>`).join('')}
            </div>
          </div>
        </div>`;
      }
      if (msg.type === 'message') {
        const isSelf = msg.sender === 'self';
        const contact = projectData.contacts.find(c => c.id === msg.sender);
        const avatar = msg.avatar || (contact ? contact.avatar : '');
        return `<div class="message-row ${isSelf ? 'self' : ''}" data-idx="${idx}" oncontextmenu="showMsgCtx(event, ${idx})">
          ${!isSelf ? `<div class="msg-avatar"><img src="${avatar}" alt=""></div>` : ''}
          <div class="msg-content">
            ${!isSelf ? `<span class="msg-sender">${msg.senderName || ''}</span>` : ''}
            <div class="msg-bubble">${msg.content}</div>
            <span class="msg-time">${msg.time || ''}</span>
          </div>
        </div>`;
      }
      return '';
    }).join('');

    // 滚动到底部
    container.scrollTop = container.scrollHeight;
  }

  // ===== 发送消息 =====
  function sendMessage() {
    if (!activeContactId) return;
    const input = document.getElementById('messageInput');
    const content = input.value.trim();
    if (!content) return;

    const senderVal = document.getElementById('senderSelect').value;
    const now = new Date();
    const time = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;

    const msg = { type: 'message', content, time };

    if (senderVal === 'self') {
      msg.sender = 'self';
    } else {
      const contact = projectData.contacts.find(c => c.id === senderVal);
      if (contact) {
        msg.sender = contact.id;
        msg.senderName = contact.name;
        msg.avatar = contact.avatar;
      }
    }

    projectData.chats[activeContactId].push(msg);
    input.value = '';
    input.style.height = 'auto';
    renderChat();
    renderContacts();
  }

  function handleInputKeydown(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResizeTextarea(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function onSenderChange() {
    // 视觉反馈
  }

  // ===== 系统消息 =====
  function addSystemMessage() {
    if (!activeContactId) return;
    document.getElementById('systemMsgModal').classList.add('show');
    document.getElementById('systemMsgInput').value = '';
    setTimeout(() => document.getElementById('systemMsgInput').focus(), 100);
  }

  function confirmSystemMessage() {
    const content = document.getElementById('systemMsgInput').value.trim();
    if (!content) return;
    projectData.chats[activeContactId].push({ type: 'system', content });
    closeModal('systemMsgModal');
    renderChat();
  }

  // ===== 选项分支 =====
  function addChoiceMessage() {
    if (!activeContactId) return;
    document.getElementById('choiceModal').classList.add('show');
    document.getElementById('choiceTitleInput').value = '';
    document.getElementById('choiceOptionsContainer').innerHTML = `
      <div class="modal-field"><label>选项 1</label><input type="text" class="choice-input" placeholder="输入选项文本..."></div>
      <div class="modal-field"><label>选项 2</label><input type="text" class="choice-input" placeholder="输入选项文本..."></div>
    `;
  }

  function addChoiceOption() {
    const container = document.getElementById('choiceOptionsContainer');
    const count = container.querySelectorAll('.choice-input').length + 1;
    const field = document.createElement('div');
    field.className = 'modal-field';
    field.innerHTML = `<label>选项 ${count}</label><input type="text" class="choice-input" placeholder="输入选项文本...">`;
    container.appendChild(field);
  }

  function confirmChoice() {
    const title = document.getElementById('choiceTitleInput').value.trim();
    const inputs = document.querySelectorAll('#choiceOptionsContainer .choice-input');
    const options = Array.from(inputs).map(i => i.value.trim()).filter(Boolean);
    if (options.length < 2) return;
    projectData.chats[activeContactId].push({ type: 'choice', title: title || '请选择', options });
    closeModal('choiceModal');
    renderChat();
  }

  // ===== 添加联系人 =====
  function initAvatarPicker() {
    const picker = document.getElementById('avatarPicker');
    picker.innerHTML = AVAILABLE_AVATARS.map(name => `
      <div class="avatar-option" onclick="pickAvatar('${name}', this)" data-name="${name}">
        <img src="${AVATARS_PATH}${name}.png" alt="${name}">
      </div>
    `).join('');
  }

  function pickAvatar(name, el) {
    selectedAvatar = name;
    document.querySelectorAll('.avatar-option').forEach(a => a.classList.remove('selected'));
    el.classList.add('selected');

    const nameInput = document.getElementById('contactNameInput');
    if (nameInput && !nameInput.value.trim()) {
      nameInput.value = name;
    }
  }

  function showAddContactModal() {
    document.getElementById('addContactModal').classList.add('show');
    document.getElementById('contactNameInput').value = '';
    selectedAvatar = null;
    document.querySelectorAll('.avatar-option').forEach(a => a.classList.remove('selected'));
    setTimeout(() => document.getElementById('contactNameInput').focus(), 100);
  }

  function confirmAddContact() {
    const typedName = document.getElementById('contactNameInput').value.trim();
    if (!selectedAvatar) return;

    const name = typedName || selectedAvatar;
    const id = addContact(name, selectedAvatar, { type: 'message', pinned: false });
    currentTab = 'messages';
    document.querySelectorAll('.contacts-tab').forEach(t => t.classList.remove('active'));
    document.querySelector('.contacts-tab[data-tab="messages"]').classList.add('active');
    closeModal('addContactModal');
    renderContacts();
    selectContact(id);
  }

  // ===== 弹窗控制 =====
  function closeModal(id) {
    document.getElementById(id).classList.remove('show');
  }

  // 点击遮罩关闭
  document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) overlay.classList.remove('show');
    });
  });

  // ===== 右键菜单 =====
  function showMsgCtx(e, idx) {
    e.preventDefault();
    contextTarget = { type: 'message', idx };
    const menu = document.getElementById('contextMenu');
    menu.classList.add('show');
    menu.style.left = e.clientX + 'px';
    menu.style.top = e.clientY + 'px';
  }

  function showContactCtx(e, contactId) {
    e.preventDefault();
    e.stopPropagation();
    contextTarget = { type: 'contact', id: contactId };
    const menu = document.getElementById('contextMenu');

    const contact = projectData.contacts.find(c => c.id === contactId);
    menu.innerHTML = `
      <button class="ctx-item" onclick="togglePin('${contactId}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        ${contact.pinned ? '取消置顶' : '置顶'}
      </button>
      <button class="ctx-item" onclick="editContact('${contactId}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
        编辑角色
      </button>
      <div class="ctx-divider"></div>
      <button class="ctx-item danger" onclick="deleteContact('${contactId}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        删除对话
      </button>
    `;
    menu.classList.add('show');
    menu.style.left = e.clientX + 'px';
    menu.style.top = e.clientY + 'px';
  }

  function hideContextMenu() {
    document.getElementById('contextMenu').classList.remove('show');
  }

  document.addEventListener('click', hideContextMenu);

  function ctxEdit() {
    if (!contextTarget || contextTarget.type !== 'message') return;
    const msg = projectData.chats[activeContactId][contextTarget.idx];
    if (!msg) return;
    const newContent = prompt('编辑消息内容:', msg.content);
    if (newContent !== null) {
      msg.content = newContent;
      renderChat();
    }
    hideContextMenu();
  }

  function ctxInsertBefore() {
    if (!contextTarget || contextTarget.type !== 'message') return;
    hideContextMenu();
    // 聚焦输入框
    document.getElementById('messageInput').focus();
    document.getElementById('messageInput').dataset.insertIdx = contextTarget.idx;
  }

  function ctxDelete() {
    if (!contextTarget || contextTarget.type !== 'message') return;
    projectData.chats[activeContactId].splice(contextTarget.idx, 1);
    renderChat();
    hideContextMenu();
  }

  function togglePin(id) {
    const contact = projectData.contacts.find(c => c.id === id);
    if (contact) {
      contact.pinned = !contact.pinned;
      renderContacts();
    }
    hideContextMenu();
  }

  function editContact(id) {
    hideContextMenu();
    // 简单编辑
    const contact = projectData.contacts.find(c => c.id === id);
    if (!contact) return;
    const newName = prompt('编辑角色名称:', contact.name);
    if (newName !== null && newName.trim()) {
      contact.name = newName.trim();
      renderContacts();
      if (activeContactId === id) selectContact(id);
    }
  }

  function deleteContact(id) {
    hideContextMenu();
    if (!confirm('确定要删除这个角色对话吗？所有聊天记录将被清除。')) return;
    projectData.contacts = projectData.contacts.filter(c => c.id !== id);
    delete projectData.chats[id];
    if (activeContactId === id) {
      activeContactId = null;
      document.getElementById('emptyState').style.display = 'flex';
      document.getElementById('chatHeader').style.display = 'none';
      document.getElementById('chatMessages').style.display = 'none';
      document.getElementById('chatInputArea').style.display = 'none';
    }
    renderContacts();
  }

  function clearChat() {
    if (!activeContactId) return;
    if (!confirm('确定要清空当前对话的所有消息吗？')) return;
    projectData.chats[activeContactId] = [];
    renderChat();
    renderContacts();
  }

  // ===== 工具栏切换 =====
  function switchTool(tool) {
    document.querySelectorAll('.toolbar-btn').forEach(b => b.classList.remove('active'));
    const btn = document.querySelector(`.toolbar-btn[data-tool="${tool}"]`);
    if (btn) btn.classList.add('active');
  }

  // ===== 旁白/延迟 =====
  function addNarration() {
    if (!activeContactId) return;
    const text = prompt('输入旁白文本:');
    if (text) {
      projectData.chats[activeContactId].push({ type: 'system', content: '【旁白】' + text });
      renderChat();
    }
  }

  function addDelay() {
    if (!activeContactId) return;
    projectData.chats[activeContactId].push({ type: 'system', content: '⏳ 延迟 1.5 秒' });
    renderChat();
  }

  function addImageMessage() {
    if (!activeContactId) return;
    const url = prompt('输入图片路径或URL:');
    if (url) {
      const senderVal = document.getElementById('senderSelect').value;
      const msg = {
        type: 'message',
        content: `<img src="${url}" style="max-width:200px; border-radius:8px;" alt="image">`,
        sender: senderVal === 'self' ? 'self' : senderVal,
        time: new Date().toTimeString().slice(0, 5)
      };
      if (senderVal !== 'self') {
        const contact = projectData.contacts.find(c => c.id === senderVal);
        if (contact) {
          msg.senderName = contact.name;
          msg.avatar = contact.avatar;
        }
      }
      projectData.chats[activeContactId].push(msg);
      renderChat();
    }
  }

  // ===== 保存/加载 =====
  function saveProject() {
    const data = JSON.stringify(projectData, null, 2);
    if (window.electronAPI) {
      window.electronAPI.saveProject(projectData);
    } else {
      // Web fallback: download as file
      const blob = new Blob([data], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'story_project.ssp';
      a.click();
      URL.revokeObjectURL(url);
    }
  }

  // ===== 窗口控制 =====
  function windowAction(action) {
    if (window.electronAPI) {
      if (action === 'minimize') window.electronAPI.windowMinimize();
      else if (action === 'maximize') window.electronAPI.windowMaximize();
      else if (action === 'close') window.electronAPI.windowClose();
    }
  }

  // ===== 键盘快捷键 =====
  document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.key === 's') {
      e.preventDefault();
      saveProject();
    }
  });

  // ===== 启动 =====
  init();
</script>

</body>
</html>
